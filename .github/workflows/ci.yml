name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Test (root if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install || true
            if npm run | grep -q "lint"; then npm run lint || true; fi
            if npm run | grep -q "test"; then npm test || true; fi
          else
            echo "No package.json in repo root; skipping root install/test.";
          fi

      - name: Search subfolders for package.json and run basic checks
        run: |
          while IFS= read -r pkg; do
            dir=$(dirname "$pkg")
            echo "-- Running in $dir --"
            pushd "$dir"
            if [ -f package.json ]; then
              npm ci || npm install || true
              if npm run | grep -q "lint"; then npm run lint || true; fi
              if npm run | grep -q "test"; then npm test || true; fi
            fi
            popd
          done < <(find . -maxdepth 3 -name package.json)
